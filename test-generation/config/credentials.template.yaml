# Test Generation Credentials Template
#
# Copy to: ~/.config/test-gen/credentials.yaml
#
# IMPORTANT: Keep this file secure! Add to .gitignore
#
# Generate tokens:
# - JIRA: https://id.atlassian.com/manage-profile/security/api-tokens
# - GitHub: https://github.com/settings/tokens
# - GitLab: https://gitlab.com/-/profile/personal_access_tokens
# - Linear: https://linear.app/settings/api

# JIRA
jira:
  email: your-email@company.com
  token: YOUR_JIRA_API_TOKEN_HERE

# GitHub
github:
  token: ghp_YOUR_GITHUB_TOKEN_HERE

# GitLab
gitlab:
  token: glpat-YOUR_GITLAB_TOKEN_HERE

# Linear
linear:
  api_key: lin_api_YOUR_LINEAR_KEY_HERE

# Custom tracker
custom:
  auth_type: bearer  # bearer, basic, or api_key
  token: YOUR_CUSTOM_TOKEN_HERE
