name: aot-debugger-agent
version: 1.0.0
description: Debug PyTorch AOT Autograd functionalization, decomposition, and gradients

# Reference agent definition
agent_definition: ../../agent-plugins/aot-debugger-agent/agents/aot-expert.md

# Skills path (bundled from vertical-plugins/)
skills_path: ../../agent-plugins/aot-debugger-agent/skills/

# MCP connectors
mcp_config: ../../agent-plugins/aot-debugger-agent/.mcp.json

# Allowed tool calls (must match agent frontmatter)
tools:
  allowed:
    - Read
    - mcp__steering__query_api_docs
    - mcp__steering__query_steering
  denied:
    - Write
    - Bash
    - Edit

# Agent-to-agent calls
callable_agents:
  - coordinator-agent
  - dynamo-debugger-agent
  - inductor-debugger-agent

# Deployment settings
deployment:
  max_turns: 5
  timeout_seconds: 300
  retry_on_error: true
  mode: interactive
