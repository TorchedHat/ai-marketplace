name: bisector-agent
version: 1.0.0
description: Automated bisection to isolate torch.compile failures

# Reference agent definition
agent_definition: ../../agent-plugins/bisector-agent/agents/bisector.md

# Skills path (bundled from vertical-plugins/)
skills_path: ../../agent-plugins/bisector-agent/skills/

# MCP connectors
mcp_config: ../../agent-plugins/bisector-agent/.mcp.json

# Allowed tool calls (must match agent frontmatter)
tools:
  allowed:
    - Read
    - Bash  # Needs Bash to run bisector
  denied:
    - Write
    - Edit

# Agent-to-agent calls
callable_agents:
  - coordinator-agent
  - dynamo-debugger-agent
  - aot-debugger-agent
  - inductor-debugger-agent

# Deployment settings
deployment:
  max_turns: 5
  timeout_seconds: 600  # Bisection can take longer
  retry_on_error: true
  mode: interactive
